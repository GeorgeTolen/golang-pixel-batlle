services:
  battle-postgres:
    image: postgres:18.1-bookworm
    container_name: battle-env-postgres
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./out/pgdata:/var/lib/postgresql
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  battle-postgres-migrate:
    image: migrate/migrate:v4.19.1
    profiles: ["tools"]
    volumes:
      - ./migrations:/migrations
    entrypoint: ["migrate"]
    command: ["-help"]
    depends_on:
      battle-postgres:
        condition: service_healthy

  port-forwarder:
    image: alpine/socat:1.8.0.3
    container_name: battle-env-port-forwarding
    profiles: ["tools"]
    command: tcp-listen:5432,fork,reuseaddr tcp-connect:battle-postgres:5432
    ports:
      - "127.0.0.1:${HOST_PG_PORT:-5433}:5432"
    depends_on:
      battle-postgres:
        condition: service_healthy
